<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookingDB - Концертное агентство</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <div class="flex h-screen overflow-hidden">
        <!-- Main Content -->
        <div class="flex-1 flex flex-col">
            <!-- Header -->
            <header class="border-b border-gray-700 bg-gray-800 px-6 py-4">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-2xl font-semibold text-white">BookingDB</h1>
                        <p class="text-sm text-gray-400">База артистов концертного агентства</p>
                    </div>
                    <div class="flex items-center gap-3">

                        <!-- Mode Toggle -->
                        <div class="mode-toggle" id="modeToggle" onclick="toggleMode()" title="Switch mode">
                            <div class="mode-option" id="modePublic">🌍 Public</div>
                            <div class="mode-option" id="modePrivate">🔒 Private</div>
                            <div class="mode-slider" id="modeSlider"></div>
                        </div>

                        <input 
                            type="file" 
                            id="jsonFileInput" 
                            accept=".json" 
                            class="hidden"
                        >
                        <button 
                            id="importJsonBtn" 
                            class="private-only bg-gray-600 hover:bg-gray-700 text-white font-medium px-4 py-2 rounded-lg transition-colors duration-200 flex items-center gap-2"
                        >
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                            </svg>
                            Import JSON
                        </button>
                        <button 
                            id="exportDatabaseBtn" 
                            class="private-only bg-gray-600 hover:bg-gray-700 text-white font-medium px-4 py-2 rounded-lg transition-colors duration-200 flex items-center gap-2"
                        >
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                            </svg>
                            Export Database
                        </button>
                        <button 
                            id="resetChangesBtn" 
                            class="private-only bg-red-600 hover:bg-red-700 text-white font-medium px-4 py-2 rounded-lg transition-colors duration-200 flex items-center gap-2"
                        >
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                            </svg>
                            Reset Local Changes
                        </button>
                        <button 
                            id="addArtistBtn" 
                            class="private-only bg-blue-600 hover:bg-blue-700 text-white font-medium px-4 py-2 rounded-lg transition-colors duration-200 flex items-center gap-2"
                        >
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                            </svg>
                            Добавить артиста
                        </button>
                    </div>
                </div>
            </header>

            <!-- Search and Filter Bar -->
            <div class="border-b border-gray-700 bg-gray-800/50 px-6 py-3">
                <div class="flex flex-wrap gap-3">
                    <div class="flex-1 min-w-[200px] relative">
                        <svg class="w-4 h-4 absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                        <input
                            type="text"
                            id="searchInput"
                            placeholder="Search artists, genre, agency, notes..."
                            class="w-full bg-gray-700 border border-gray-600 rounded-lg pl-9 pr-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        >
                    </div>
                    <select id="genreFilter" class="bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">All Genres</option>
                    </select>
                    <select id="countryFilter" class="bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">All Countries</option>
                    </select>
                    <select id="bookingStatusFilter" class="bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">All Statuses</option>
                        <option value="Not contacted">Not contacted</option>
                        <option value="Contacted">Contacted</option>
                        <option value="Negotiating">Negotiating</option>
                        <option value="Confirmed">Confirmed</option>
                        <option value="Declined">Declined</option>
                    </select>
                    <select id="agencyTypeFilter" class="bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">All Agency Types</option>
                    </select>
                    <select id="sortBy" class="bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="name">Sort: Name</option>
                        <option value="country">Sort: Country</option>
                        <option value="priority">Sort: Priority</option>
                        <option value="interest">Sort: Interest</option>
                        <option value="agency">Sort: Agency</option>
                    </select>
                </div>
            </div>

            <!-- Table Container -->
            <div class="flex-1 overflow-auto flex flex-col">
                <div class="flex-1 overflow-auto">
                    <table class="w-full">
                        <thead class="bg-gray-800 sticky top-0">
                            <tr>
                                <th class="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider border-b border-gray-700">Artist</th>
                                <th class="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider border-b border-gray-700">Genre</th>
                                <th class="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider border-b border-gray-700">Country</th>
                                <th class="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider border-b border-gray-700">Agency</th>
                                <th class="private-only text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider border-b border-gray-700">Booking Fee</th>
                                <th class="private-only text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider border-b border-gray-700">Planned Event</th>
                                <th class="private-only text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider border-b border-gray-700">Booking Status</th>
                                <th class="private-only text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider border-b border-gray-700">Interest</th>
                                <th class="private-only text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-wider border-b border-gray-700">Priority</th>
                            </tr>
                        </thead>
                        <tbody id="artistsTableBody" class="divide-y divide-gray-700">
                            <!-- Artist rows will be inserted here -->
                        </tbody>
                    </table>

                    <!-- Empty State -->
                    <div id="emptyState" class="hidden flex flex-col items-center justify-center py-16">
                        <div class="text-6xl mb-4">🎤</div>
                        <p class="text-gray-400 text-lg">No artists found</p>
                    </div>
                </div>

                <!-- Pagination -->
                <div id="pagination" class="pagination">
                    <button id="firstPageBtn" disabled>«</button>
                    <button id="prevPageBtn" disabled>‹</button>
                    <span class="page-info" id="pageInfo">Страница 1 из 1</span>
                    <button id="nextPageBtn">›</button>
                    <button id="lastPageBtn">»</button>
                    <select id="pageSize" class="bg-gray-700 border border-gray-600 rounded px-2 py-1 text-sm">
                        <option value="25">25</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Side Panel -->
        <div id="sidePanel" class="w-96 bg-gray-800 border-l border-gray-700 transform translate-x-full transition-transform duration-300 ease-in-out fixed right-0 top-0 h-full z-40">
            <div class="h-full flex flex-col">
                <!-- Panel Header -->
                <div class="border-b border-gray-700 px-6 py-4 flex items-center justify-between">
                    <h2 class="text-lg font-semibold text-white">Детали артиста</h2>
                    <button id="closePanelBtn" class="text-gray-400 hover:text-white transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>

                <!-- Panel Content -->
                <div id="panelContent" class="flex-1 overflow-auto p-6">
                    <!-- Artist details will be inserted here -->
                </div>

                <!-- Panel Footer -->
                <div class="private-only border-t border-gray-700 px-6 py-4 flex gap-3">
                    <button id="editArtistBtn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg transition-colors duration-200">
                        Редактировать
                    </button>
                    <button id="deleteArtistBtn" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-medium py-2 rounded-lg transition-colors duration-200">
                        Удалить
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for Adding/Editing Artist -->
    <div id="artistModal" class="fixed inset-0 bg-black bg-opacity-60 hidden items-center justify-center z-50 p-4">
        <div class="bg-gray-800 rounded-xl w-full max-w-lg border border-gray-700 flex flex-col" style="max-height:90vh">

            <!-- Fixed header -->
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-700 flex-shrink-0">
                <h2 id="modalTitle" class="text-xl font-bold text-white">Добавить артиста</h2>
                <button type="button" onclick="closeModal()" class="text-gray-400 hover:text-white transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>

            <!-- Scrollable form body -->
            <div class="overflow-y-auto flex-1 px-6 py-4">
            <form id="artistForm">
                <input type="hidden" id="artistId">
                
                <div class="mb-4">
                    <label class="block text-gray-300 mb-2">Имя артиста</label>
                    <input 
                        type="text" 
                        id="artistName" 
                        required
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                </div>

                <div class="mb-4">
                    <label class="block text-gray-300 mb-2">Genre</label>
                    <input
                        type="text"
                        id="artistGenre"
                        required
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                </div>

                <div class="mb-4">
                    <label class="block text-gray-300 mb-2">Страна</label>
                    <input 
                        type="text" 
                        id="artistCountry" 
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                </div>

                <div class="mb-4">
                    <label class="block text-gray-300 mb-2">Agency</label>
                    <input 
                        type="text" 
                        id="artistAgency" 
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                </div>

                <div class="mb-4">
                    <label class="block text-gray-300 mb-2">Agency Type</label>
                    <select 
                        id="artistAgencyType" 
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                        <option value="">— Select —</option>
                        <option value="Independent">Independent</option>
                        <option value="Small Agency">Small Agency</option>
                        <option value="Major Agency">Major Agency</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="block text-gray-300 mb-2">Status</label>
                    <select 
                        id="artistStatus" 
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                        <option value="active">Активен</option>
                        <option value="inactive">Неактивен</option>
                        <option value="pending">Ожидает</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="block text-gray-300 mb-2">Booking Status</label>
                    <select
                        id="artistBookingStatus"
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                        <option value="">-- Not set --</option>
                        <option value="Not contacted">Not contacted</option>
                        <option value="Contacted">Contacted</option>
                        <option value="Negotiating">Negotiating</option>
                        <option value="Confirmed">Confirmed</option>
                        <option value="Declined">Declined</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="block text-gray-300 mb-2">Interest (1–5 ★)</label>
                    <input
                        type="number"
                        id="artistInterest"
                        min="0"
                        max="5"
                        value="0"
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                </div>

                <div class="mb-4">
                    <label class="block text-gray-300 mb-2">Priority (1–5 ★)</label>
                    <input 
                        type="number" 
                        id="artistPriority" 
                        min="0" 
                        max="5"
                        value="0"
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                </div>

                <div class="mb-4">
                    <label class="block text-gray-300 mb-2">E-mail</label>
                    <input 
                        type="email" 
                        id="artistContact" 
                        required
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                </div>

                <div class="mb-4">
                    <label class="block text-gray-300 mb-2">Сайт</label>
                    <input 
                        type="url" 
                        id="artistWebsite" 
                        placeholder="https://"
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                </div>

                <div class="mb-4">
                    <label class="block text-gray-300 mb-2">Instagram</label>
                    <input 
                        type="text" 
                        id="artistInstagram" 
                        placeholder="@username"
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                </div>

                <div class="mb-4">
                    <label class="block text-gray-300 mb-2">Facebook</label>
                    <input 
                        type="text" 
                        id="artistFacebook" 
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                </div>

                <div class="mb-4">
                    <label class="block text-gray-300 mb-2">Booking Fee (1–5)</label>
                    <input 
                        type="number" 
                        id="artistBookingFee"
                        min="0"
                        max="5"
                        value="0"
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                </div>

                <div class="mb-4">
                    <label class="block text-gray-300 mb-2">Planned Event</label>
                    <input 
                        type="text" 
                        id="artistPlannedEvent"
                        placeholder="e.g. Dominator, PRSPCT, TBA"
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                </div>

                <div class="mb-6">
                    <label class="block text-gray-300 mb-2">Описание</label>
                    <textarea 
                        id="artistDescription" 
                        rows="3"
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    ></textarea>
                </div>

                <div class="mb-6">
                    <label class="block text-gray-300 mb-2">Заметки</label>
                    <textarea 
                        id="artistNotes" 
                        rows="3"
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    ></textarea>
                </div>

            </form>
            </div>

            <!-- Fixed footer with buttons -->
            <div class="flex gap-3 px-6 py-4 border-t border-gray-700 flex-shrink-0">
                <button
                    type="submit"
                    form="artistForm"
                    class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition-colors duration-200"
                >
                    Сохранить
                </button>
                <button
                    type="button"
                    id="cancelBtn"
                    class="flex-1 bg-gray-600 hover:bg-gray-700 text-white font-semibold py-2 rounded-lg transition-colors duration-200"
                >
                    Отмена
                </button>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
